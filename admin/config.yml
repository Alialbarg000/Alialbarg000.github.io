backend:
  name: git-gateway
  branch: main
  identity_url: "https://sansoonyachtservices.netlify.app/.netlify/identity"
  gateway_url: "https://sansoonyachtservices.netlify.app/.netlify/git/github"

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Main Body Text", name: "body", widget: "markdown" }
